name: MongoDB Keep Alive

on:
  schedule:
    # Run every 10 minutes to keep backend warm and prevent MongoDB cold start
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          curl -sSf "https://c-mail-backend.vercel.app/api/health" || echo "Backend health check failed"
      
      - name: Ping Frontend
        run: |
          curl -sSf "https://c-mail.vercel.app" || echo "Frontend ping failed"
      
      - name: Log Status
        run: |
          echo "Keep-alive ping completed at $(date)"
          echo "Prevents:"
          echo "- MongoDB Atlas sleep after 6+ hours inactivity"
          echo "- Vercel backend cold start"
          echo "- 90-day refresh token expiration from inactivity"
